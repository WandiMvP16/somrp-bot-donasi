name: Discord Notify

on:
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"🔔 **SOMRP Bot Update!**\n👤 ${{ github.actor }} push ke ${{ github.ref_name }}\n📝 ${{ github.event.commits[0].message }}\n🔗 ${{ github.event.compare }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"